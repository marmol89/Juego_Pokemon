name: Build Cross-Platform Executables

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: JuegoPokemon-linux
          - os: windows-latest
            artifact_name: JuegoPokemon-windows
          - os: macos-latest
            artifact_name: JuegoPokemon-macos
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build with PyInstaller
      run: |
        python build.py
        
    - name: Rename executable for release
      shell: bash
      run: |
        mkdir -p release_files
        if [ -f dist/JuegoPokemon.exe ]; then
          mv dist/JuegoPokemon.exe release_files/JuegoPokemon-windows.exe
        elif [ -f dist/JuegoPokemon ]; then
          mv dist/JuegoPokemon release_files/${{ matrix.artifact_name }}
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: release_files/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all_artifacts
        merge-multiple: true
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        draft: false
        prerelease: false
        files: |
          all_artifacts/JuegoPokemon-windows.exe
          all_artifacts/JuegoPokemon-linux
          all_artifacts/JuegoPokemon-macos
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
